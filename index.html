<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم دریافت آی‌پي</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 100%; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; font-size: 20px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 13px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #38bdf8; outline: none; }
        .ip-box { background: #0f172a; padding: 15px; border-radius: 8px; font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #22c55e; margin: 20px 0; border: 1px solid #334155; cursor: pointer; }
        .btn { background: #0284c7; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #0369a1; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
        .toast { display: none; margin-top: 10px; color: #38bdf8; font-size: 12px; }
        .hidden { display: none; }
        .admin-zone { margin-top: 30px; border-top: 1px dashed #334155; padding-top: 15px; }
        .file-label { cursor: pointer; background: #1e293b; border: 1px dashed #64748b; padding: 8px; display: block; border-radius: 6px; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

<div class="card" id="login-card">
    <h2>🔐 ورود به شبکه SSH PRO</h2>
    <p>برای دریافت آی‌پی جدید سرور، لطفاً نام کاربری و کلمه عبور اشتراک خود را وارد کنید.</p>
    
    <div class="form-group">
        <label>نام کاربری (Username)</label>
        <input type="text" id="username" placeholder="نام کاربری خود را وارد کنید">
    </div>
    
    <div class="form-group">
        <label>کلمه عبور (Password)</label>
        <input type="password" id="password" placeholder="کلمه عبور خود را وارد کنید">
    </div>
    
    <button class="btn" onclick="handleLogin()">ورود و بررسی وضعیت</button>
    <div class="error-msg" id="error-text">نام کاربری یا کلمه عبور اشتباه است! ❌</div>
</div>

<div class="card hidden" id="ip-card">
    <h2>⚡ اتصال مجدد به سرویس</h2>
    <p>خوش آمدید! آی‌پی جدید و بدون فیلتر سرور در کادر زیر قرار دارد:</p>
    
    <div class="ip-box" id="ip-text">144.172.116.73</div>
    
    <button class="btn" onclick="copyIP()">📋 کپی کردن آی‌پی جدید</button>
    <button class="btn" style="background:#334155; margin-top:8px;" onclick="logout()">خروج از حساب</button>
    <div class="toast" id="toast-msg">آی‌پی با موفقیت کپی شد! ✔</div>
</div>

<div class="admin-zone" style="max-width: 400px; width: 100%; position: absolute; bottom: 10px; text-align: center; opacity: 0.4;">
    <label class="file-label">
        ⚙️ همگام‌سازی دیتابیس کاربران (آپلود json بک‌آپ پنل)
        <input type="file" id="backup-file" accept=".json" onchange="syncDatabase(this)" style="display: none;">
    </label>
</div>

<script>
// دیتابیس پیش‌فرض کاربران (اگر بک‌آپ هم آپلود نکنی، این یوزر تست کار میکند)
let usersDatabase = [
    {"username": "admin", "password": "adminpassword", "status": "Active"}
];

// لود کردن کاربران همگام‌سازی شده از حافظه مرورگر
if (localStorage.getItem('users_db')) {
    usersDatabase = JSON.parse(localStorage.getItem('users_db'));
}

function handleLogin() {
    const userIn = document.getElementById('username').value.trim();
    const passIn = document.getElementById('password').value.trim();
    const errorText = document.getElementById('error-text');

    // بررسی وجود یوزر و پسورد در دیتابیس پنل
    const foundUser = usersDatabase.find(u => u.username === userIn && u.password === passIn);

    if (foundUser) {
        if (foundUser.status !== 'Active') {
            errorText.innerText = "حساب شما به اتمام رسیده یا مسدود است! ⚠️";
            errorText.style.display = 'block';
            return;
        }
        errorText.style.display = 'none';
        document.getElementById('login-card').classList.add('hidden');
        document.getElementById('ip-card').classList.remove('hidden');
    } else {
        errorText.innerText = "نام کاربری یا کلمه عبور اشتباه است! ❌";
        errorText.style.display = 'block';
    }
}

function copyIP() {
    const ipText = document.getElementById('ip-text').innerText;
    navigator.clipboard.writeText(ipText).then(() => {
        const toast = document.getElementById('toast-msg');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    });
}

function logout() {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('ip-card').classList.add('hidden');
    document.getElementById('login-card').classList.remove('hidden');
}

// تابع جادویی همگام‌سازی خودکار کلاینت‌ها با فایل بک‌آپ پنل اصلی شما
function syncDatabase(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function() {
        try {
            const importedData = JSON.parse(reader.result);
            if (Array.isArray(importedData)) {
                localStorage.setItem('users_db', JSON.stringify(importedData));
                usersDatabase = importedData;
                alert("🟢 دیتابیس کاربران با موفقیت همگام‌سازی شد! تعداد کاربران: " + importedData.length);
                location.reload();
            }
        } catch(e) {
            alert("❌ فایل بک‌آپ معتبر نیست.");
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
