<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دریافت آی‌پی جدید سرویس</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 90%; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; font-size: 20px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .ip-box { background: #0f172a; padding: 15px; border-radius: 8px; font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #22c55e; margin: 20px 0; border: 1px solid #334155; cursor: pointer; position: relative; }
        .btn { background: #0284c7; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; transition: 0.2s; }
        .btn:hover { background: #0369a1; }
        .toast { display: none; margin-top: 10px; color: #38bdf8; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ اتصال مجدد به سرویس SSH PRO</h2>
    <p>اگر اتصال شما قطع شده است، آی‌پی جدید سرور را از کادر زیر کپی کرده و در اپلیکیشن یا تنظیمات خود جایگزین کنید.</p>
    
    <div class="ip-box" id="ip-text">144.172.116.73</div>
    
    <button class="btn" onclick="copyIP()">📋 کپی کردن آی‌پی جدید</button>
    <div class="toast" id="toast-msg">آی‌پی با موفقیت کپی شد! ✔</div>
</div>

<script>
function copyIP() {
    const ipText = document.getElementById('ip-text').innerText;
    navigator.clipboard.writeText(ipText).then(() => {
        const toast = document.getElementById('toast-msg');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    });
}
</script>

</body>
</html>
